<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>MyCloset</title></head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>MyCloset</h1>

    <!-- 検索フォーム -->
    <form th:action="@{/clothes}" method="get" style="margin-bottom: 20px;">
        <select name="category">
            <!-- 💡 param.categoryの安全な判定に修正（500エラー対策） -->
            <option value="" th:selected="${param.category == null || #strings.isEmpty(param.category)}">全てのカテゴリ</option>
            
            <option th:each="cat : ${categories}" 
                    th:value="${cat.name()}" 
                    th:text="${cat.displayName}"
                    th:selected="${param.category != null && !#strings.isEmpty(param.category) && param.category[0] == cat.name()}">
            </option>
        </select>
        <button type="submit">絞り込み</button>
        <a th:href="@{/clothes}">クリア</a>
    </form>
	
    <!-- 登録・編集フォーム -->
    <form th:action="@{/clothes/save}" th:object="${newCloth}" method="post" style="background:#f0f0f0; padding:15px; margin-bottom:20px;">
        <input type="hidden" th:field="*{id}" />
        
        <input type="text" th:field="*{name}" placeholder="名前" required />
			
        <select th:field="*{category}" required>
            <option value="">-- カテゴリを選択 --</option>
            <option th:each="cat : ${categories}" 
                    th:value="${cat.name()}" 
                    th:text="${cat.displayName}"></option>
        </select>

        <!-- 属性（複数選択可） -->
		<div style="margin-bottom: 15px;">
			<label>属性（複数選択可）：</label>
			<div th:each="attr : ${allAttributes}">
			    <!-- 💡 idとforを動的に紐付けて、文字クリックでもチェックできるようにする -->
			    <input type="checkbox" 
			           name="attributes" 
			           th:value="${attr.name()}" 
			           th:id="${'attr-' + attr.name()}" />
			    <label th:for="${'attr-' + attr.name()}" 
			           th:text="${attr.displayName}">
			        トップス
			    </label>
			</div>

        <!-- 💡 【超重要】波括弧の位置を修正してThymeleafのパースエラーを解決！ -->
        <button type="submit" th:text="*{id != null ? '更新' : '登録'}">保存</button>
        <a th:href="@{/clothes(category=${param.category})}">キャンセル</a>
    </form>

    <!-- 一覧テーブル -->
    <div style="max-height: 350px; overflow-y: auto; margin-bottom: 20px;">
        <table border="1" cellpadding="5" style="border-collapse: collapse; width: 100%;">
            <thead style="position: sticky; top: 0; background-color: #f0f0f0;">
                <tr><th>ID</th><th>名前</th><th>カテゴリ</th><th>属性</th><th>操作</th></tr>
            </thead>
            <tbody>
                <tr th:each="cloth : ${clothes}" style="text-align: center;">
                    <td th:text="${cloth.id}"></td>
                    <td th:text="${cloth.name}" style="text-align: left;"></td>
                    <td th:text="${cloth.category}"></td>
                    
                    <!-- 💡 th:blockを使ってnull安全にバッジを分割表示！ -->
					<td style="text-align: left;">
					    <th:block th:if="${cloth.attribute != null && !cloth.attribute.isEmpty()}">
					        <!-- 💡 【ここを修正！】#strings を使わず、Javaの split を直接呼び出すお！ -->
					        <span th:each="tag : ${cloth.attribute.split(',')}" 
					              style="background-color: #e0e0e0; padding: 2px 6px; margin-right: 4px; border-radius: 4px; font-size: 0.85em; display: inline-block;">
					            [[${tag}]]
					        </span>
					    </th:block>
					    <th:block th:unless="${cloth.attribute != null && !cloth.attribute.isEmpty()}">
					        <span>（なし）</span>
					    </th:block>
					</td>
                    
                    <td>
                        <a th:href="@{/clothes/edit/{id}(id=${cloth.id}, category=${param.category})}">編集</a> |
                        <a th:href="@{/clothes/delete/{id}(id=${cloth.id})}" th:onclick="return confirm('削除しますか？')">削除</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
		
    <form action="/clothes/coordinate" method="get" style="margin-top: 20px;">
        <button type="submit">コーディネートを自動生成</button>
    </form>
	
</body>
</html>
